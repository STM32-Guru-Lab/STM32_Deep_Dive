# OpenOCD Konfiguration für ST-Link v2 und STM32F103C6
# Dogmatisch: OpenOCD 0.12.0

# Interface - ST-Link v2
source [find interface/stlink-v2.cfg]

# Transport - SWD (Serial Wire Debug)
transport select hla_swd

# Ziel-Chip - STM32F103C6 (Medium Density)
set CHIPNAME stm32f1x
source [find target/stm32f1x.cfg]

# Reset-Konfiguration
reset_config srst_only
adapter_nsrst_delay 100
adapter_nsrst_assert_width 100

# Geschwindigkeit
adapter_khz 1000

# Flash-Bank Konfiguration
$_TARGETNAME configure -event gdb-attach {
    echo "Debugger attached"
    reset init
}

$_TARGETNAME configure -event gdb-detach {
    echo "Debugger detached"
    reset halt
}

# Workaround für ST-Link v2 Probleme
hla_serial "\"\\\\.\\USB#VID_0483&PID_3748\""